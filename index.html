<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTPForms — Site en maintenance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:#f7f7fa;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.card{background:#fff;border:1px solid #e4e4e7;border-radius:20px;padding:52px 44px;text-align:center;max-width:480px;width:100%}
.logo{font-size:22px;font-weight:600;color:#111827;margin-bottom:36px;display:flex;align-items:center;justify-content:center;gap:8px}
.icon{font-size:48px;margin-bottom:20px}
h1{font-size:24px;font-weight:600;color:#111827;margin-bottom:12px;line-height:1.2}
p{font-size:15px;color:#6b7280;line-height:1.7;font-weight:300;margin-bottom:28px}
.badge{display:inline-flex;align-items:center;gap:6px;background:#f0edff;color:#3282DE;font-size:13px;font-weight:600;padding:6px 16px;border-radius:20px;border:1px solid rgba(50,130,222,.2)}
.dot{width:6px;height:6px;border-radius:50%;background:#3282DE;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🏗 BTPForms</div>
  <div class="icon">🔧</div>
  <h1>Site en cours de maintenance</h1>
  <p>Nous effectuons des améliorations pour vous offrir une meilleure expérience. Le site sera de nouveau disponible très prochainement.</p>
  <div class="badge"><span class="dot"></span>Bientôt de retour</div>
</div>
</body>
</html>
